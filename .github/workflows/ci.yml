name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: hero_pet_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: hero_pet_test
      DATABASE_URL: postgresql://postgres:testpass@127.0.0.1:5432/hero_pet_test
      MIGRATIONS_AUTO_APPLY: 1
      NODE_ENV: test
      TEST_PORT: 3100
      BASE_URL: http://localhost:3100
      NEXTAUTH_SECRET: test-secret-for-ci
      NEXTAUTH_URL: http://localhost:3100
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do sleep 1; done

      - name: Run tests (no docker compose)
        run: npm run test:ci

      - name: Run unit tests (Vitest)
        run: npm run test:unit
